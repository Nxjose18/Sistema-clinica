<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clinica - Mis Citas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background-color: #666666;
      color: #e0e0e0;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #bb862c;
    }

    input, select {
      padding: 8px;
      width: 270px;
      background-color: #1e1e1e;
      color: #cccccc;
      border: 1px solid #333333;
      border-radius: 18px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #bb86fc;
    }

    button {
      padding: 10px 15px;
      background-color: #1e1e1e;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: #6200ee;
    }

    .btn-salir {
      background-color: #333333;
      margin-left: 10px;
      text-decoration: none;
      padding: 10px 15px;
      color: #e0e0e0;
      display: inline-block;
      font-size: 14px;
      border-radius: 4px;
    }

    .btn-salir:hover {
      background-color: #444444;
      color: #ffffff;
    }

    table {
      width: 90%;
      border-collapse: collapse;
      margin-top: 40px;
      background-color: #1e1e1e;
    }

    th, td {
      border: 1px solid #666666;
      padding: 10px;
      text-align: left;
    }

    th {
      background-color: #252525;
      color: #7b61ec;
    }

    td {
      color: #e0e0e0;
    }

    .btn-cancelar {
      background-color: #d96d86;
      padding: 5px 10px;
      font-size: 14px;
      color: #000000;
      font-weight: bold;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .btn-cancelar:hover {
      background-color: #b00020;
      color: #ffffff;
    }

    hr {
      border: 0;
      height: 1px;
      background: #333333;
      margin: 30px 0;
    }

    .usuario-banner {
      background-color: #1a1a1e;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 5px solid #7b61ec;
    }
  </style>
</head>
<body>

<div class="usuario-banner">
  <h3 style="margin: 0; color: #ffffff;">Hi Hitler camarada: <span id="nombreUsuarioSpan" style="color: #bb862c;">Cargando...</span></h3>
</div>

<h2>Registrar Nueva Cita</h2>

<form id="formCita">
  <div class="form-group">
    <label for="dia">Día:</label>
    <input type="date" id="dia" required>
  </div>
  <div class="form-group">
    <label for="hora">Hora:</label>
    <input type="time" id="hora" required>
  </div>

  <div class="form-group">
    <label for="sede">Sede:</label>
    <select id="sede" required>
      <option value="" disabled selected>Seleccione una sede...</option>
      <option value="Sede Central">Sede Central</option>
      <option value="Sede San Isidro">Sede San Isidro</option>
      <option value="Sede Los Olivos">Sede Los Olivos</option>
      <option value="Sede Miraflores">Sede Miraflores</option>
    </select>
  </div>

  <div class="form-group">
    <label for="doctor">Doctor:</label>
    <select id="doctor" required>
      <option value="" disabled selected>Seleccione un doctor...</option>
      <option value="Dr. Carlos Mendoza (Pediatría)">Dr. Carlos Mendoza (Pediatría)</option>
      <option value="Dra. Ana Torres (Cardiología)">Dra. Ana Torres (Cardiología)</option>
      <option value="Dr. Luis Gómez (Medicina General)">Dr. Luis Gómez (Medicina General)</option>
      <option value="Dra. Elena Ramos (Ginecología)">Dra. Elena Ramos (Ginecología)</option>
    </select>
  </div>

  <button type="submit">Registrar Cita</button>
  <a href="#" onclick="cerrarSesion()" class="btn-salir">Cerrar Sesión</a>
</form>

<hr>

<h2>Mis Citas Reservadas</h2>
<table>
  <thead>
  <tr>
    <th>ID Cita</th>
    <th>Día</th>
    <th>Hora</th>
    <th>Sede</th>
    <th>Doctor</th>
    <th>Acción</th>
  </tr>
  </thead>
  <tbody id="tablaCitasBody">
  </tbody>
</table>

<script>
  const API_URL = 'http://localhost:8080/cita';

  // Obtenemos los datos guardados del usuario en el login.
  // IMPORTANTE: Asegúrate de guardar el objeto completo o el ID del usuario en tu fetch de Login.
  const usuarioLogueadoNombre = sessionStorage.getItem('usuarioLogueado');

  // Para pruebas dinámicas, asumiremos que guardas el ID de la persona en sessionStorage como 'usuarioLogueadoId'.
  // Si en tu login guardaste el JSON completo, puedes usar JSON.parse().
  const usuarioId = sessionStorage.getItem('usuarioLogueadoId') || 1; // Por defecto asigna 1 si no encuentra

  // Mostrar el nombre del usuario arriba
  if (usuarioLogueadoNombre) {
    document.getElementById('nombreUsuarioSpan').innerText = usuarioLogueadoNombre.toUpperCase();
  } else {
    // Si intentan entrar a index2.html sin loguearse, los bota al login
    window.location.href = 'index.html';
  }

  // Al cargar la página, traer SOLAMENTE las citas de este usuario
  document.addEventListener('DOMContentLoaded', cargarCitas);

  function cargarCitas() {
    // Enviamos el ID del usuario como parámetro de consulta (?personaId=X)
    fetch(`${API_URL}?personaId=${usuarioId}`)
            .then(response => response.json())
            .then(citas => {
              const tbody = document.getElementById('tablaCitasBody');
              tbody.innerHTML = '';

              citas.forEach(cita => {
                const fila = document.createElement('tr');
                fila.innerHTML = `
                        <td>${cita.id}</td>
                        <td>${cita.dia}</td>
                        <td>${cita.hora}</td>
                        <td>${cita.sede}</td>
                        <td>${cita.doctor}</td>
                        <td>
                            <button class="btn-cancelar" onclick="cancelarCita(${cita.id})">Cancelar Cita</button>
                        </td>
                    `;
                tbody.appendChild(fila);
              });
            })
            .catch(error => console.error('Error al cargar citas:', error));
  }

  // Evento para Registrar Cita enlazada al usuario logueado
  document.getElementById('formCita').addEventListener('submit', function(event) {
    event.preventDefault();

    const citaData = {
      dia: document.getElementById('dia').value,
      hora: document.getElementById('hora').value,
      sede: document.getElementById('sede').value,
      doctor: document.getElementById('doctor').value,
      // Pasamos el objeto persona con su respectivo ID para cumplir con la relación @ManyToOne de Java
      persona: {
        id: parseInt(usuarioId)
      }
    };

    fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(citaData)
    })
            .then(response => response.json())
            .then(data => {
              alert('Cita registrada con éxito.');
              document.getElementById('formCita').reset();
              cargarCitas(); // Refresca la tabla mostrando solo sus citas
            })
            .catch(error => {
              console.error('Error:', error);
              alert('Hubo un error al registrar la cita.');
            });
  });

  // Función para Cancelar (Eliminar) Cita
  function cancelarCita(id) {
    if (confirm('¿Estás seguro de que deseas cancelar esta cita?')) {
      const citaAEliminar = { id: id };

      fetch(`${API_URL}/eliminar`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(citaAEliminar)
      })
              .then(response => {
                if(response.ok) {
                  alert('Cita cancelada correctamente.');
                  cargarCitas();
                } else {
                  alert('No se pudo eliminar la cita.');
                }
              })
              .catch(error => {
                console.error('Error al eliminar:', error);
                alert('Error en el servidor al intentar cancelar.');
              });
    }
  }

  function cerrarSesion() {
    sessionStorage.clear();
    window.location.href = 'index.html';
  }
</script>

</body>
</html>
